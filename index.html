<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f0efe9;
      --surface:      #ffffff;
      --border:       #e4e2db;
      --text:         #1c1c1c;
      --text-muted:   #999;
      --accent:       #5b6af0;
      --accent-hover: #4a59df;
      --accent-light: #eef0fd;
      --danger:       #e05555;
      --danger-light: #fdf0f0;
      --done-color:   #bbb;
      --radius:       14px;
      --shadow:       0 8px 32px rgba(0,0,0,0.10);
    }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
                   'Noto Sans JP', 'Yu Gothic', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100dvh;
      padding: 2rem 1rem 4rem;
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); border: 0;
    }

    /* ── App Card ── */
    .app {
      max-width: 580px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    /* ── Input Area ── */
    .input-area {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .add-form {
      display: flex;
      gap: 0.75rem;
    }

    .add-input {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
    }

    .add-input:focus {
      border-color: var(--accent);
      background: #fff;
    }

    .add-input::placeholder {
      color: var(--text-muted);
    }

    .add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.7rem 1.25rem;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .add-btn:hover { background: var(--accent-hover); }
    .add-btn:active { transform: scale(0.97); }

    /* ── Filter Bar ── */
    .filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .filter-btn {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 0.5rem;
      font-size: 0.875rem;
      font-family: inherit;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.18s;
      font-weight: 500;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Todo List ── */
    .todo-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    #todo-list {
      list-style: none;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.2s ease;
      cursor: grab;
      transition: background 0.15s;
    }

    .todo-item:last-child { border-bottom: none; }
    .todo-item:hover { background: var(--bg); }
    .todo-item.drag-over { border-top: 2px solid var(--accent); }
    .todo-item.dragging { opacity: 0.4; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Checkbox */
    .todo-check {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
      position: relative;
    }

    .todo-check:hover { border-color: var(--accent); }

    .todo-check:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .todo-check:checked::after {
      content: '';
      position: absolute;
      left: 5px; top: 2px;
      width: 8px; height: 12px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    /* Todo text */
    .todo-text {
      flex: 1;
      font-size: 1rem;
      word-break: break-all;
      transition: color 0.2s;
      cursor: text;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: var(--done-color);
    }

    .edit-input {
      flex: 1;
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 0.3rem 0.6rem;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--accent-light);
      outline: none;
    }

    /* Delete button */
    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0.25rem;
      border-radius: 6px;
      line-height: 1;
      opacity: 0;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .todo-item:hover .delete-btn { opacity: 1; }

    .delete-btn:hover {
      background: var(--danger-light);
      color: var(--danger);
    }

    .delete-btn svg { display: block; }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state .empty-icon {
      font-size: 3rem;
      margin-bottom: 0.75rem;
    }

    .empty-state p {
      font-size: 0.95rem;
    }

    /* ── Footer ── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .clear-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.875rem;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .clear-btn:hover {
      background: var(--danger-light);
      color: var(--danger);
    }

    .clear-btn.hidden { display: none; }

    /* ── Progress Bar ── */
    .progress-wrap {
      padding: 0 1.25rem 1rem;
    }

    .progress-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ── Aria live ── */
    #announcer { speak: polite; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { padding: 1rem 0.75rem 3rem; }
      .add-btn span { display: none; }
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <h1>My <span>TODO</span></h1>
    <p>ダブルクリックでタスクを編集 · ドラッグで並び替え</p>
  </header>

  <section class="input-area">
    <label for="new-todo" class="sr-only">新しいタスク</label>
    <form class="add-form" id="add-form">
      <input
        type="text"
        id="new-todo"
        class="add-input"
        placeholder="新しいタスクを入力..."
        autocomplete="off"
        maxlength="200"
      >
      <button type="submit" class="add-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <span>追加</span>
      </button>
    </form>
  </section>

  <div class="filters" role="group" aria-label="フィルター">
    <button class="filter-btn active" data-filter="all" aria-pressed="true">すべて</button>
    <button class="filter-btn" data-filter="active" aria-pressed="false">未完了</button>
    <button class="filter-btn" data-filter="completed" aria-pressed="false">完了済み</button>
  </div>

  <div class="todo-card">
    <ul id="todo-list" aria-label="タスクリスト"></ul>
    <div class="card-footer">
      <span id="remaining-count">0件残り</span>
      <button class="clear-btn hidden" id="clear-completed">完了済みを削除</button>
    </div>
  </div>
</div>

<div id="announcer" class="sr-only" aria-live="polite"></div>

<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'todo_app_v1';

  // ── State ──────────────────────────────────────────────
  let state = {
    todos: [],
    filter: 'all',
    dragSrcId: null,
  };

  // ── Persistence ────────────────────────────────────────
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        state.todos = Array.isArray(saved.todos) ? saved.todos : [];
        state.filter = saved.filter || 'all';
      }
    } catch (e) { /* ignore */ }
  }

  function persist() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        todos: state.todos,
        filter: state.filter,
      }));
    } catch (e) { /* ignore */ }
  }

  // ── Mutations ──────────────────────────────────────────
  function uid() {
    return (typeof crypto !== 'undefined' && crypto.randomUUID)
      ? crypto.randomUUID()
      : Math.random().toString(36).slice(2) + Date.now();
  }

  function addTodo(text) {
    text = text.trim();
    if (!text) return;
    state.todos.unshift({ id: uid(), text, completed: false, createdAt: Date.now() });
    persist();
    render();
    announce(text + ' を追加しました');
  }

  function deleteTodo(id) {
    const todo = state.todos.find(t => t.id === id);
    state.todos = state.todos.filter(t => t.id !== id);
    persist();
    render();
    if (todo) announce(todo.text + ' を削除しました');
  }

  function toggleTodo(id) {
    state.todos = state.todos.map(t =>
      t.id === id ? { ...t, completed: !t.completed } : t
    );
    persist();
    render();
  }

  function editTodo(id, newText) {
    newText = newText.trim();
    if (!newText) { deleteTodo(id); return; }
    state.todos = state.todos.map(t =>
      t.id === id ? { ...t, text: newText } : t
    );
    persist();
    render();
  }

  function clearCompleted() {
    state.todos = state.todos.filter(t => !t.completed);
    persist();
    render();
    announce('完了済みタスクを削除しました');
  }

  function reorderTodos(fromId, toId) {
    if (fromId === toId) return;
    const fromIdx = state.todos.findIndex(t => t.id === fromId);
    const toIdx   = state.todos.findIndex(t => t.id === toId);
    if (fromIdx === -1 || toIdx === -1) return;
    const copy = [...state.todos];
    const [item] = copy.splice(fromIdx, 1);
    copy.splice(toIdx, 0, item);
    state.todos = copy;
    persist();
    render();
  }

  // ── Aria announce ──────────────────────────────────────
  function announce(msg) {
    const el = document.getElementById('announcer');
    el.textContent = '';
    requestAnimationFrame(() => { el.textContent = msg; });
  }

  // ── Rendering ──────────────────────────────────────────
  function getFiltered() {
    switch (state.filter) {
      case 'active':    return state.todos.filter(t => !t.completed);
      case 'completed': return state.todos.filter(t =>  t.completed);
      default:          return state.todos;
    }
  }

  function render() {
    renderList();
    renderFooter();
    renderFilters();
    renderProgress();
  }

  function renderList() {
    const list = document.getElementById('todo-list');
    const filtered = getFiltered();
    list.innerHTML = '';

    if (filtered.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'empty-state';
      const msgs = {
        all:       { icon: '📝', text: 'タスクがありません。追加してみましょう！' },
        active:    { icon: '✅', text: '未完了のタスクはありません。' },
        completed: { icon: '🎉', text: '完了済みのタスクはありません。' },
      };
      const m = msgs[state.filter];
      empty.innerHTML = `<div class="empty-icon">${m.icon}</div><p>${m.text}</p>`;
      list.appendChild(empty);
      return;
    }

    filtered.forEach(todo => {
      list.appendChild(renderItem(todo));
    });
  }

  function renderItem(todo) {
    const li = document.createElement('li');
    li.className = 'todo-item' + (todo.completed ? ' completed' : '');
    li.dataset.id = todo.id;
    li.draggable = true;

    // Checkbox
    const check = document.createElement('input');
    check.type = 'checkbox';
    check.className = 'todo-check';
    check.checked = todo.completed;
    check.setAttribute('aria-label', todo.text + (todo.completed ? '（完了）' : ''));
    check.addEventListener('change', () => toggleTodo(todo.id));

    // Text span
    const span = document.createElement('span');
    span.className = 'todo-text';
    span.textContent = todo.text;
    span.title = 'ダブルクリックで編集';
    span.addEventListener('dblclick', () => startEdit(li, todo, span));

    // Delete button
    const del = document.createElement('button');
    del.className = 'delete-btn';
    del.setAttribute('aria-label', `「${todo.text}」を削除`);
    del.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 9h8l1-9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
    del.addEventListener('click', () => deleteTodo(todo.id));

    // Drag handlers
    li.addEventListener('dragstart', e => {
      state.dragSrcId = todo.id;
      li.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    li.addEventListener('dragend', () => {
      li.classList.remove('dragging', 'drag-over');
    });
    li.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('drag-over'));
      li.classList.add('drag-over');
    });
    li.addEventListener('dragleave', () => {
      li.classList.remove('drag-over');
    });
    li.addEventListener('drop', e => {
      e.preventDefault();
      li.classList.remove('drag-over');
      if (state.dragSrcId && state.dragSrcId !== todo.id) {
        reorderTodos(state.dragSrcId, todo.id);
      }
      state.dragSrcId = null;
    });

    // Touch drag (mobile)
    attachTouchDrag(li, todo.id);

    li.appendChild(check);
    li.appendChild(span);
    li.appendChild(del);
    return li;
  }

  function renderFooter() {
    const remaining = state.todos.filter(t => !t.completed).length;
    document.getElementById('remaining-count').textContent =
      remaining === 0 ? 'すべて完了！' : `${remaining}件残り`;

    const clearBtn = document.getElementById('clear-completed');
    const hasCompleted = state.todos.some(t => t.completed);
    clearBtn.classList.toggle('hidden', !hasCompleted);
  }

  function renderFilters() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      const active = btn.dataset.filter === state.filter;
      btn.classList.toggle('active', active);
      btn.setAttribute('aria-pressed', String(active));
    });
  }

  function renderProgress() {
    let wrap = document.querySelector('.progress-wrap');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.className = 'progress-wrap';
      wrap.innerHTML = `<div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill"></div></div>`;
      document.querySelector('.todo-card').before(wrap);
    }

    const total     = state.todos.length;
    const completed = state.todos.filter(t => t.completed).length;
    const pct = total === 0 ? 0 : Math.round((completed / total) * 100);
    const fill = document.getElementById('prog-fill');
    if (fill) fill.style.width = pct + '%';
    wrap.style.display = total === 0 ? 'none' : '';
  }

  // ── Inline Edit ────────────────────────────────────────
  function startEdit(li, todo, span) {
    if (li.querySelector('.edit-input')) return; // already editing
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'edit-input';
    input.value = todo.text;
    input.maxLength = 200;
    span.replaceWith(input);
    input.focus();
    input.select();

    let committed = false;

    function commit() {
      if (committed) return;
      committed = true;
      editTodo(todo.id, input.value);
    }

    input.addEventListener('blur',    commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); commit(); }
      if (e.key === 'Escape') {
        committed = true;
        render(); // revert
      }
    });
  }

  // ── Touch Drag (mobile) ────────────────────────────────
  function attachTouchDrag(li, id) {
    let startY, lastTarget;
    li.addEventListener('touchstart', e => {
      startY = e.touches[0].clientY;
      state.dragSrcId = id;
    }, { passive: true });

    li.addEventListener('touchmove', e => {
      if (!state.dragSrcId) return;
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el && el.closest('.todo-item[data-id]');
      document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('drag-over'));
      if (target && target !== li) {
        target.classList.add('drag-over');
        lastTarget = target;
      }
    }, { passive: true });

    li.addEventListener('touchend', () => {
      document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('drag-over'));
      if (lastTarget && state.dragSrcId) {
        const toId = lastTarget.dataset.id;
        if (toId && toId !== state.dragSrcId) {
          reorderTodos(state.dragSrcId, toId);
        }
      }
      state.dragSrcId = null;
      lastTarget = null;
    });
  }

  // ── Event Listeners ────────────────────────────────────
  function init() {
    load();

    // Add form
    document.getElementById('add-form').addEventListener('submit', e => {
      e.preventDefault();
      const input = document.getElementById('new-todo');
      addTodo(input.value);
      input.value = '';
      input.focus();
    });

    // Filters (event delegation)
    document.querySelector('.filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      state.filter = btn.dataset.filter;
      persist();
      render();
    });

    // Clear completed
    document.getElementById('clear-completed').addEventListener('click', clearCompleted);

    render();
  }

  init();
})();
</script>
</body>
</html>
